<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1b2a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>鳌拜驿站</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
--bg:#0d1b2a;--bg2:#112240;--bg3:#1a2f4a;
--shark-blue:#4da8da;--shark-light:#7ec8e3;--shark-belly:#e0e8f0;
--phil-orange:#e8923a;--phil-warm:#f0a850;
--accent-purple:#a78bba;
--text:#d1d9e0;--text-dim:#8899aa;--text-bright:#f0f4f8;
--card:#15253d;--card-border:#1e3454;
--good:#5cb888;--mid:#d4a843;--bad:#c45c5c;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans','Noto Sans SC',sans-serif}
.app{height:100%;display:flex;flex-direction:column}
.app-content{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 16px 24px;-webkit-overflow-scrolling:touch}
/* Bottom Nav */
.nav{display:flex;background:var(--bg2);border-top:1px solid var(--card-border);padding:8px 0 calc(8px + env(safe-area-inset-bottom));position:relative}
.nav::before{content:'';position:absolute;top:-20px;left:0;right:0;height:20px;
background:linear-gradient(transparent,var(--bg));pointer-events:none}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;
cursor:pointer;opacity:.5;transition:all .3s;border:none;background:none;color:var(--text)}
.nav-item.active{opacity:1;color:var(--shark-blue)}
.nav-item span{font-size:11px;font-weight:500}
.nav-icon{font-size:20px}
/* Splash */
.splash{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;
align-items:center;justify-content:center;gap:20px;animation:splashPulse 3s ease-in-out infinite}
@keyframes splashPulse{0%,100%{box-shadow:inset 0 0 80px rgba(77,168,218,.05)}50%{box-shadow:inset 0 0 120px rgba(77,168,218,.12)}}
.splash-img{width:160px;height:160px;border-radius:50%;object-fit:cover;
border:3px solid var(--shark-blue);box-shadow:0 0 40px rgba(77,168,218,.3)}
.splash-title{font-size:28px;font-weight:700;color:var(--shark-belly);letter-spacing:2px}
.splash-sub{font-size:14px;color:var(--text-dim);font-style:italic}
.splash-enter{margin-top:20px;padding:12px 40px;background:var(--shark-blue);color:var(--bg);
font-size:15px;font-weight:600;border:none;border-radius:30px;cursor:pointer;
transition:all .3s;letter-spacing:1px}
.splash-enter:active{transform:scale(.95);background:var(--shark-light)}
.splash-footer{position:absolute;bottom:40px;font-size:11px;color:var(--text-dim);opacity:.6}
/* Ring Progress */
.ring-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;margin:8px 0 20px}
.ring-container{position:relative;width:180px;height:180px}
.ring-container svg{transform:rotate(-90deg)}
.ring-day{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-day-num{font-size:42px;font-weight:700;color:var(--shark-belly);font-family:'DM Mono',monospace}
.ring-day-label{font-size:12px;color:var(--text-dim);margin-top:-2px}
.stage-label{display:inline-block;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:600;
background:rgba(77,168,218,.15);color:var(--shark-blue);border:1px solid rgba(77,168,218,.25)}
.stage-next{font-size:11px;color:var(--text-dim);margin-top:4px}
/* Phil Message */
.phil-msg{background:var(--card);border-radius:16px;padding:16px;margin:16px 0;
border:1px solid var(--card-border);position:relative;overflow:hidden}
.phil-msg::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
background:linear-gradient(90deg,var(--shark-blue),var(--phil-orange))}
.phil-msg-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.phil-msg-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;
border:2px solid var(--phil-orange)}
.phil-msg-name{font-size:11px;color:var(--phil-orange);font-weight:600;letter-spacing:.5px}
.phil-msg-text{font-size:14px;line-height:1.7;color:var(--text)}
.phil-msg-paw{text-align:right;margin-top:8px;font-size:14px;opacity:.5}
.phil-msg-fav{position:absolute;top:12px;right:12px;background:none;border:none;
font-size:18px;cursor:pointer;opacity:.4;transition:all .3s}
.phil-msg-fav.saved{opacity:1;color:var(--phil-orange)}
/* Blood Test Card */
.blood-card{background:var(--card);border-radius:14px;padding:14px 16px;
border:1px solid var(--card-border);margin:12px 0;display:flex;align-items:center;gap:12px}
.blood-icon{font-size:24px}
.blood-info{flex:1}
.blood-label{font-size:11px;color:var(--text-dim);font-weight:500}
.blood-days{font-size:20px;font-weight:700;color:var(--shark-light);font-family:'DM Mono',monospace}
.blood-edit{background:none;border:1px solid var(--card-border);color:var(--text-dim);
padding:6px 12px;border-radius:8px;font-size:11px;cursor:pointer}
/* Mood Check-in */
.mood-section{margin:16px 0}
.mood-title{font-size:12px;color:var(--text-dim);font-weight:500;margin-bottom:10px;letter-spacing:.5px}
.mood-buttons{display:flex;gap:8px}
.mood-btn{flex:1;padding:14px 8px;background:var(--card);border:1px solid var(--card-border);
border-radius:14px;cursor:pointer;text-align:center;transition:all .3s}
.mood-btn:active{transform:scale(.95)}
.mood-btn.selected{border-color:var(--shark-blue);background:rgba(77,168,218,.1)}
.mood-emoji{font-size:28px;display:block;margin-bottom:4px}
.mood-label{font-size:11px;color:var(--text-dim)}
.mood-response{margin-top:14px;background:var(--card);border-radius:14px;padding:14px;
border:1px solid var(--card-border);display:flex;gap:12px;align-items:flex-start;
animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.mood-resp-avatar{width:48px;height:48px;border-radius:50%;object-fit:cover;flex-shrink:0;
border:2px solid var(--card-border)}
.mood-resp-text{font-size:13px;line-height:1.6;color:var(--text)}
/* Log Tab */
.log-date{font-size:13px;color:var(--shark-light);font-weight:600;margin-bottom:12px;
font-family:'DM Mono',monospace}
.log-dims{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.log-dim{background:var(--card);border-radius:14px;padding:14px;border:1px solid var(--card-border)}
.log-dim-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.log-dim-icon{font-size:16px}
.log-dim-name{font-size:12px;font-weight:600;color:var(--text)}
.log-opts{display:flex;gap:6px;flex-wrap:wrap}
.log-opt{padding:8px 14px;border-radius:20px;border:1px solid var(--card-border);background:var(--bg2);
font-size:13px;cursor:pointer;transition:all .3s;color:var(--text)}
.log-opt:active{transform:scale(.95)}
.log-opt.selected{border-color:var(--shark-blue);background:rgba(77,168,218,.15);color:var(--shark-light)}
.log-note{width:100%;background:var(--bg2);border:1px solid var(--card-border);border-radius:12px;
padding:12px;color:var(--text);font-size:13px;font-family:inherit;resize:none;margin-top:10px;
min-height:60px}
.log-note::placeholder{color:var(--text-dim)}
.log-submit{width:100%;padding:14px;background:var(--shark-blue);color:var(--bg);font-size:14px;
font-weight:600;border:none;border-radius:14px;cursor:pointer;margin-top:12px;transition:all .3s;
letter-spacing:.5px}
.log-submit:active{transform:scale(.97);background:var(--shark-light)}
.log-submit:disabled{opacity:.4;cursor:default}
/* History */
.history-section{margin-top:24px}
.history-title{font-size:12px;color:var(--text-dim);font-weight:500;margin-bottom:10px;
display:flex;align-items:center;justify-content:space-between}
.history-item{background:var(--card);border-radius:12px;padding:12px;margin-bottom:8px;
border:1px solid var(--card-border)}
.history-date{font-size:11px;color:var(--shark-blue);font-family:'DM Mono',monospace;margin-bottom:6px}
.history-tags{display:flex;gap:6px;flex-wrap:wrap}
.history-tag{font-size:12px;padding:3px 8px;border-radius:8px;background:var(--bg2)}
.history-note{font-size:11px;color:var(--text-dim);margin-top:6px;font-style:italic}
/* Data Tab */
.data-section{margin-bottom:24px}
.data-title{font-size:14px;font-weight:600;color:var(--shark-belly);margin-bottom:12px;
display:flex;align-items:center;gap:8px}
.blood-form{background:var(--card);border-radius:14px;padding:16px;border:1px solid var(--card-border)}
.blood-row{display:flex;gap:10px;margin-bottom:10px;align-items:center}
.blood-input-label{font-size:12px;color:var(--text-dim);width:60px;flex-shrink:0}
.blood-input{flex:1;background:var(--bg2);border:1px solid var(--card-border);border-radius:8px;
padding:8px 12px;color:var(--text);font-size:14px;font-family:'DM Mono',monospace}
.blood-input:focus{outline:none;border-color:var(--shark-blue)}
.blood-save{padding:10px 24px;background:var(--shark-blue);color:var(--bg);border:none;
border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;margin-top:6px}
.blood-history{margin-top:12px}
.blood-entry{display:flex;justify-content:space-between;align-items:center;padding:10px;
background:var(--bg2);border-radius:10px;margin-bottom:6px;font-size:12px}
.blood-val{font-family:'DM Mono',monospace;color:var(--shark-light)}
/* Trend Chart */
.trend-chart{background:var(--card);border-radius:14px;padding:16px;border:1px solid var(--card-border)}
.trend-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.trend-label{font-size:11px;color:var(--text-dim);width:50px;flex-shrink:0}
.trend-bar-wrap{flex:1;display:flex;gap:2px;align-items:center}
.trend-dot{width:14px;height:14px;border-radius:4px;display:flex;align-items:center;
justify-content:center;font-size:9px}
/* Fav Tab */
.fav-section{margin-top:8px}
.fav-empty{text-align:center;padding:40px 20px;color:var(--text-dim)}
.fav-empty img{width:120px;height:120px;border-radius:50%;object-fit:cover;margin-bottom:16px;opacity:.5}
.fav-item{background:var(--card);border-radius:14px;padding:14px;margin-bottom:10px;
border:1px solid var(--card-border);position:relative}
.fav-item-text{font-size:13px;line-height:1.6}
.fav-item-date{font-size:10px;color:var(--text-dim);margin-top:6px;font-family:'DM Mono',monospace}
.fav-remove{position:absolute;top:10px;right:10px;background:none;border:none;
color:var(--text-dim);cursor:pointer;font-size:14px}
/* Milestone Modal */
.milestone-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:90;
display:flex;align-items:center;justify-content:center;animation:fadeIn .4s}
.milestone-card{background:var(--bg2);border-radius:20px;padding:30px 24px;max-width:320px;
width:90%;text-align:center;border:1px solid var(--shark-blue);
box-shadow:0 0 60px rgba(77,168,218,.2)}
.milestone-img{width:140px;height:140px;border-radius:50%;object-fit:cover;margin:0 auto 16px;
border:3px solid var(--phil-orange)}
.milestone-title{font-size:24px;font-weight:700;color:var(--shark-belly)}
.milestone-sub{font-size:12px;color:var(--shark-blue);font-family:'DM Mono',monospace;margin:4px 0 16px}
.milestone-text{font-size:13px;line-height:1.7;color:var(--text)}
.milestone-close{margin-top:20px;padding:10px 30px;background:var(--shark-blue);color:var(--bg);
border:none;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer}
/* Settings */
.settings-gear{position:fixed;bottom:calc(60px + env(safe-area-inset-bottom) + 16px);right:16px;
width:32px;height:32px;border-radius:50%;background:var(--bg2);border:1px solid var(--card-border);
display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:.3;
transition:opacity .3s;z-index:10;font-size:14px}
.settings-gear:hover,.settings-gear:active{opacity:.7}
.settings-panel{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:80;display:none;
align-items:flex-end;justify-content:center}
.settings-panel.show{display:flex}
.settings-sheet{background:var(--bg2);border-radius:20px 20px 0 0;padding:24px 20px calc(24px + env(safe-area-inset-bottom));
width:100%;max-width:420px;max-height:70vh;overflow-y:auto}
.settings-handle{width:40px;height:4px;background:var(--card-border);border-radius:2px;margin:0 auto 20px}
.settings-title{font-size:16px;font-weight:600;color:var(--shark-belly);margin-bottom:16px}
.settings-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;
border-bottom:1px solid var(--card-border)}
.settings-row label{font-size:13px;color:var(--text)}
.settings-row input{background:var(--bg);border:1px solid var(--card-border);border-radius:8px;
padding:6px 10px;color:var(--text);font-size:13px;font-family:'DM Mono',monospace;width:140px;text-align:right}
.settings-danger{margin-top:20px;padding:10px;background:rgba(196,92,92,.1);border:1px solid rgba(196,92,92,.3);
border-radius:10px;text-align:center;color:var(--bad);font-size:12px;cursor:pointer}
/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--phil-orange);
color:var(--bg);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:95;
animation:toastIn .4s ease;pointer-events:none}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
/* Bubbles */
.bubbles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bubble{position:absolute;border-radius:50%;background:rgba(77,168,218,.06);
animation:bubbleUp linear infinite}
@keyframes bubbleUp{0%{transform:translateY(100vh) translateX(0);opacity:0}
10%{opacity:1}90%{opacity:1}100%{transform:translateY(-10vh) translateX(30px);opacity:0}}
</style>
</head>

// ===== State =====
const LS_PREFIX = 'aobaStation_';
const ls = {
  get(k, def=null){ try{const v=localStorage.getItem(LS_PREFIX+k);return v?JSON.parse(v):def}catch(e){return def} },
  set(k,v){ localStorage.setItem(LS_PREFIX+k, JSON.stringify(v)) },
  remove(k){ localStorage.removeItem(LS_PREFIX+k) }
};

let state = {
  startDate: ls.get('startDate', '2026-03-18'),
  lastBlood: ls.get('lastBlood', null),
  logs: ls.get('logs', []),
  bloodTests: ls.get('bloodTests', []),
  favs: ls.get('favs', []),
  seenMilestones: ls.get('seenMilestones', []),
  moodToday: ls.get('moodToday_' + todayStr(), null),
  splashSeen: ls.get('splashSeen', false),
  tab: 'home'
};

function todayStr(){ return new Date().toISOString().slice(0,10) }

function daysSinceStart(){
  const start = new Date(state.startDate);
  const now = new Date(todayStr());
  return Math.floor((now - start) / 86400000) + 1;
}

function getStage(day){
  if(day <= 90) return {name:'适应期', phase:'adapt', color:'var(--shark-blue)', next:90-day};
  if(day <= 180) return {name:'过渡期', phase:'transit', color:'var(--accent-purple)', next:180-day};
  return {name:'稳定期', phase:'stable', color:'var(--phil-orange)', next:null};
}

function seededRandom(seed){
  let s = seed % 2147483647;
  if(s <= 0) s += 2147483646;
  return () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };
}

function getDailyMessage(){
  const day = daysSinceStart();
  const stage = getStage(day);
  const pool = APP_DATA.messages[stage.phase];
  const dateNum = parseInt(todayStr().replace(/-/g,''));
  const rng = seededRandom(dateNum);
  const idx = Math.floor(rng() * pool.length);
  return pool[idx];
}

function getMoodResponse(mood){
  const pool = APP_DATA.mood_responses[mood];
  const dateNum = parseInt(todayStr().replace(/-/g,''));
  const rng = seededRandom(dateNum + 999);
  return pool[Math.floor(rng() * pool.length)];
}

function save(){
  ls.set('startDate', state.startDate);
  ls.set('lastBlood', state.lastBlood);
  ls.set('logs', state.logs);
  ls.set('bloodTests', state.bloodTests);
  ls.set('favs', state.favs);
  ls.set('seenMilestones', state.seenMilestones);
  ls.set('moodToday_' + todayStr(), state.moodToday);
}

function render(){
  const app = document.getElementById('app');
  if(!state.splashSeen){
    app.innerHTML = renderSplash();
    return;
  }
  app.innerHTML = renderContent() + renderNav();
  checkMilestone();
}

function renderSplash(){
  return `<div class="splash" onclick="enterApp()">
    <img class="splash-img" src="${IMAGES.splash}" alt="Phil & Cici">
    <div class="splash-title">鳌拜驿站</div>
    <div class="splash-sub">偶像被迫营业中</div>

  </div>`;
}

function enterApp(){
  state.splashSeen = true;
  ls.set('splashSeen', true);
  render();
}

function renderNav(){
  const tabs = [
    {id:'home', icon:'🦈', label:'驿站'},
    {id:'log', icon:'📋', label:'日志'},
    {id:'data', icon:'📊', label:'数据'},
    {id:'fav', icon:'⭐', label:'语录'}
  ];
  return `<nav class="nav">${tabs.map(t =>
    `<button class="nav-item ${state.tab===t.id?'active':''}" onclick="switchTab('${t.id}')">
      <span class="nav-icon">${t.icon}</span><span>${t.label}</span>
    </button>`
  ).join('')}</nav>
  <div class="settings-gear" onclick="toggleSettings()">⚙</div>`;
}

function switchTab(t){ state.tab = t; render(); }

function renderContent(){
  const c = document.createElement('div');
  c.className = 'app-content';
  switch(state.tab){
    case 'home': return `<div class="app-content">${renderHome()}</div>`;
    case 'log': return `<div class="app-content">${renderLog()}</div>`;
    case 'data': return `<div class="app-content">${renderData()}</div>`;
    case 'fav': return `<div class="app-content">${renderFav()}</div>`;
  }
}

// ===== HOME TAB =====
function renderHome(){
  const day = daysSinceStart();
  const stage = getStage(day);
  const msg = getDailyMessage();
  const isFav = state.favs.includes(msg.id);

  let bloodHtml = '';
  if(state.lastBlood){
    const last = new Date(state.lastBlood);
    const next = new Date(last.getTime() + 30*86400000);
    const diff = Math.ceil((next - new Date()) / 86400000);
    bloodHtml = `<div class="blood-card">
      <div class="blood-icon">🩸</div>
      <div class="blood-info">
        <div class="blood-label">距离下次血检</div>
        <div class="blood-days">${diff > 0 ? diff + ' 天' : '已到期'}</div>
      </div>
      <button class="blood-edit" onclick="editBloodDate()">更新</button>
    </div>`;
  } else {
    bloodHtml = `<div class="blood-card" onclick="editBloodDate()" style="cursor:pointer">
      <div class="blood-icon">🩸</div>
      <div class="blood-info">
        <div class="blood-label">点击设置上次血检日期</div>
        <div class="blood-days" style="font-size:13px;color:var(--text-dim)">开始追踪</div>
      </div>
    </div>`;
  }

  // Ring progress
  const maxDay = stage.phase === 'adapt' ? 90 : stage.phase === 'transit' ? 180 : 365;
  const progress = Math.min(day / maxDay, 1);
  const r = 75, circ = 2 * Math.PI * r;
  const offset = circ * (1 - progress);

  return `<div class="ring-wrap">
    <div class="ring-container">
      <svg width="180" height="180" viewBox="0 0 180 180">
        <circle cx="90" cy="90" r="${r}" fill="none" stroke="var(--card-border)" stroke-width="8"/>
        <circle cx="90" cy="90" r="${r}" fill="none" stroke="${stage.color}" stroke-width="8"
          stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"
          style="transition:stroke-dashoffset 1s ease"/>
      </svg>
      <div class="ring-day">
        <div class="ring-day-num">Day ${day}</div>
        <div class="ring-day-label">/ ${maxDay}</div>
      </div>
    </div>
    <span class="stage-label">${stage.name}</span>
    ${stage.next !== null ? `<div class="stage-next">距下一阶段还有 ${stage.next} 天</div>` : ''}
  </div>

  <div class="phil-msg">
    <button class="phil-msg-fav ${isFav?'saved':''}" onclick="toggleFav(${msg.id})">${isFav?'★':'☆'}</button>
    <div class="phil-msg-header">
      <img class="phil-msg-avatar" src="${IMAGES.avatar}" alt="Phil">
      <div class="phil-msg-name">鳌拜 · 给 zikin 姨姨的话</div>
    </div>
    <div class="phil-msg-text">${msg.text}</div>
    <div class="phil-msg-paw">🐾</div>
  </div>

  ${bloodHtml}

  <div class="mood-section">
    <div class="mood-title">TODAY'S CHECK-IN</div>
    <div class="mood-buttons">
      <button class="mood-btn ${state.moodToday==='good'?'selected':''}" onclick="checkMood('good')">
        <span class="mood-emoji">😊</span><span class="mood-label">还行</span>
      </button>
      <button class="mood-btn ${state.moodToday==='mid'?'selected':''}" onclick="checkMood('mid')">
        <span class="mood-emoji">😐</span><span class="mood-label">有点焦虑</span>
      </button>
      <button class="mood-btn ${state.moodToday==='bad'?'selected':''}" onclick="checkMood('bad')">
        <span class="mood-emoji">😢</span><span class="mood-label">不太好</span>
      </button>
    </div>
    ${state.moodToday ? renderMoodResponse(state.moodToday) : ''}
  </div>`;
}

function renderMoodResponse(mood){
  const avatarMap = {good: IMAGES.mood_good, mid: IMAGES.mood_mid, bad: IMAGES.mood_bad};
  const resp = getMoodResponse(mood);
  return `<div class="mood-response">
    <img class="mood-resp-avatar" src="${avatarMap[mood]}" alt="Phil">
    <div class="mood-resp-text">${resp}</div>
  </div>`;
}

function checkMood(mood){
  state.moodToday = mood;
  ls.set('moodToday_' + todayStr(), mood);

function toggleFav(id){
  const idx = state.favs.indexOf(id);
  if(idx === -1){

    state.lastBlood = d;

    <textarea class="log-note" id="logNote" placeholder="备注（选填）">${logSelection.note||''}</textarea>
    <button class="log-submit" ${!hasAll?'disabled':''} onclick="submitLog()">
      ${todayLog ? '更新今日记录' : '🦈 记录今天'}
    </button>
    <div class="history-section">
      <div class="history-title"><span>历史记录（近14天）</span></div>
      ${histHtml}
    </div>`;
}

function selectLog(key, val){
  logSelection[key] = val;
  render();
}

function submitLog(){
  const note = document.getElementById('logNote')?.value?.trim() || '';
  const today = todayStr();
  const existing = state.logs.findIndex(l => l.date === today);
  const entry = {date: today, data: {...logSelection, note}};
  if(existing >= 0) state.logs[existing] = entry;
  else state.logs.push(entry);
  save();
  showToast('记录完成 🦈');
  render();
}

// ===== DATA TAB =====
function renderData(){
  // Blood test input
  const bloodEntries = [...state.bloodTests].sort((a,b) => b.date.localeCompare(a.date));

  const bloodListHtml = bloodEntries.length ? bloodEntries.map(e =>
    `<div class="blood-entry">
      <span>${e.date}</span>
      <span>E2: <span class="blood-val">${e.e2 || '-'}</span> pg/mL</span>
      <span>T: <span class="blood-val">${e.t || '-'}</span> ng/dL</span>
    </div>`
  ).join('') : '';

  // Trend from logs
  const last7 = [...state.logs].sort((a,b) => b.date.localeCompare(a.date)).slice(0, 7).reverse();
  const dimColors = {skin:'var(--shark-blue)', mood:'var(--accent-purple)', energy:'var(--phil-orange)', sleep:'var(--shark-light)'};
  const dimNames = {skin:'🪞 皮肤', mood:'💭 情绪', energy:'⚡ 精力', sleep:'😴 睡眠'};
  const valMap = {
    good:3, great:3, high:3, ok:2, anx:1, low:1, bad:0, anx2:0
  };
  const dotColors = ['var(--bad)','var(--mid)','var(--text-dim)','var(--good)'];

  let trendHtml = '';
  if(last7.length >= 2){
    trendHtml = `<div class="data-title">📈 近7天趋势</div><div class="trend-chart">` +
      ['skin','mood','energy','sleep'].map(dim => {
        const dots = last7.map(l => {
          const v = valMap[l.data[dim]] ?? -1;
          if(v < 0) return `<div class="trend-dot" style="background:var(--card-border)">·</div>`;
          return `<div class="trend-dot" style="background:${dotColors[v]}"></div>`;
        }).join('');
        return `<div class="trend-row"><span class="trend-label">${dimNames[dim]}</span><div class="trend-bar-wrap">${dots}</div></div>`;
      }).join('') + '</div>';
  }

  const emptyImg = !bloodEntries.length && last7.length < 2 ?
    `<div style="text-align:center;padding:30px 20px">
      <img src="${IMAGES.empty}" style="width:120px;height:120px;border-radius:50%;object-fit:cover;opacity:.5;margin-bottom:12px">
      <div style="color:var(--text-dim);font-size:13px">还没有数据。鳌拜表示不满。</div>
    </div>` : '';

  return `<div class="data-section">
    <div class="data-title">🩸 血检记录</div>
    <div class="blood-form">
      <div class="blood-row">
        <span class="blood-input-label">日期</span>
        <input class="blood-input" type="date" id="bloodDate" value="${todayStr()}">
      </div>
      <div class="blood-row">
        <span class="blood-input-label">E2</span>
        <input class="blood-input" type="number" id="bloodE2" placeholder="pg/mL">
      </div>
      <div class="blood-row">
        <span class="blood-input-label">T</span>
        <input class="blood-input" type="number" id="bloodT" placeholder="ng/dL">
      </div>
      <button class="blood-save" onclick="saveBloodTest()">保存</button>
    </div>
    <div class="blood-history">${bloodListHtml}</div>
  </div>
  <div class="data-section">${trendHtml}</div>
  ${emptyImg}`;
}

function saveBloodTest(){
  const date = document.getElementById('bloodDate')?.value;
  const e2 = document.getElementById('bloodE2')?.value;
  const t = document.getElementById('bloodT')?.value;
  if(!date) return;
  state.bloodTests.push({date, e2: e2||null, t: t||null});
  state.lastBlood = date;
  save();
  showToast('血检记录已保存');
  render();
}

// ===== FAV TAB =====
function renderFav(){
  if(!state.favs.length){
    return `<div class="fav-section">
      <div style="text-align:center;padding:40px 20px">
        <img src="${IMAGES.empty}" style="width:100px;height:100px;border-radius:50%;object-fit:cover;opacity:.4;margin-bottom:12px">
        <div style="color:var(--text-dim);font-size:14px;font-weight:500;margin-bottom:6px">鳌拜语录</div>
        <div style="color:var(--text-dim);font-size:12px">还没有收藏。去首页点 ☆ 收藏鳌拜的话吧。</div>
      </div>
    </div>`;
  }

  const allMsgs = [...APP_DATA.messages.adapt, ...APP_DATA.messages.transit, ...APP_DATA.messages.stable];
  const items = state.favs.map(id => {
    const m = allMsgs.find(x => x.id === id);
    if(!m) return '';
    return `<div class="fav-item">
      <button class="fav-remove" onclick="removeFav(${id})">✕</button>
      <div class="fav-item-text">${m.text}</div>
    </div>`;
  }).join('');

  return `<div class="fav-section">
    <div style="font-size:14px;font-weight:600;color:var(--shark-belly);margin-bottom:14px;display:flex;align-items:center;gap:8px">
      ⭐ 鳌拜语录 <span style="font-size:12px;color:var(--text-dim);font-weight:400">${state.favs.length} 条</span>
    </div>
    ${items}
  </div>`;
}

function removeFav(id){
  state.favs = state.favs.filter(x => x !== id);
  save();
  render();
}

// ===== Milestones =====
function checkMilestone(){
  const day = daysSinceStart();
  const milestones = [30, 90, 180];
  for(const m of milestones){
    if(day >= m && !state.seenMilestones.includes(m)){
      showMilestone(m);
      state.seenMilestones.push(m);
      save();
      break;
    }
  }
}

function showMilestone(day){
  const data = APP_DATA.milestones[day];
  if(!data) return;
  const imgMap = {30: IMAGES.mile_30, 90: IMAGES.mile_90, 180: IMAGES.mile_180};
  const overlay = document.createElement('div');
  overlay.className = 'milestone-overlay';
  overlay.innerHTML = `<div class="milestone-card">
    <img class="milestone-img" src="${imgMap[day]}" alt="Phil">
    <div class="milestone-title">${data.title}</div>
    <div class="milestone-sub">${data.subtitle}</div>
    <div class="milestone-text">${data.text}</div>
    <button class="milestone-close" onclick="this.closest('.milestone-overlay').remove()">收到 🐾</button>
  </div>`;
  document.body.appendChild(overlay);
}

// ===== Settings =====
function toggleSettings(){
  let panel = document.querySelector('.settings-panel');
  if(panel){ panel.classList.toggle('show'); return; }
  panel = document.createElement('div');
  panel.className = 'settings-panel show';
  panel.innerHTML = `<div class="settings-sheet">
    <div class="settings-handle"></div>
    <div class="settings-title">设置</div>
    <div class="settings-row">
      <label>起始日期</label>
      <input type="date" value="${state.startDate}" onchange="updateStart(this.value)">
    </div>
    <div class="settings-row">
      <label>上次血检</label>
      <input type="date" value="${state.lastBlood||''}" onchange="updateBlood(this.value)">
    </div>
    <div class="settings-danger" onclick="if(confirm('确定要清除所有数据吗？'))clearAll()">清除所有数据</div>
  </div>`;
  panel.addEventListener('click', e => { if(e.target === panel) panel.classList.remove('show'); });
  document.body.appendChild(panel);
}

function updateStart(v){ if(v){state.startDate=v;save();render();} }
function updateBlood(v){ state.lastBlood=v||null;save();render(); }
function clearAll(){
  Object.keys(localStorage).filter(k=>k.startsWith(LS_PREFIX)).forEach(k=>localStorage.removeItem(k));
  location.reload();
}

// ===== Utils =====
function showToast(msg){
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// Bubbles
function initBubbles(){
  const c = document.getElementById('bubbles');
  for(let i = 0; i < 10; i++){
    const b = document.createElement('div');
    b.className = 'bubble';
    const size = 8 + Math.random() * 30;
    b.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;
      animation-duration:${15+Math.random()*20}s;animation-delay:${Math.random()*15}s`;
    c.appendChild(b);
  }
}

// Init
initBubbles();
render();

// Service Worker
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
</script>
</body>
</html>
